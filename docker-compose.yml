services:
  validator:
    build: ./validator
    container_name: solana-validator
    ports:
      - "8899:8899"     # Solana RPC
      - "10000:10000"   # Yellowstone gRPC
    volumes:
      # Use named volume (fresh ledger) or bind mount existing ledger:
      # - ./test-ledger:/ledger
      - validator-ledger:/ledger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/health"]
      interval: 5s
      retries: 30
      timeout: 10s
      start_period: 30s
  postgres:
    image: postgres:15
    container_name: explorer-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: explorer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
  indexer:
    build: ./indexer
    container_name: solana-indexer
    depends_on:
      validator:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/explorer
      YELLOWSTONE_ADDR: validator:10000
      # YELLOWSTONE_XTOKEN: (optional - leave unset to connect without authentication)
volumes:
  validator-ledger:
  pgdata: